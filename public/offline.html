<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coachlix - Loading</title>
  <style>
    @keyframes cl-logo-enter {
      0%   { opacity: 0; transform: scale(0.65); }
      65%  { opacity: 1; transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes cl-glow-pulse {
      0%, 100% {
        box-shadow:
          0 0 28px 8px rgba(99,102,241,0.35),
          0 0 60px 20px rgba(139,92,246,0.18);
      }
      50% {
        box-shadow:
          0 0 48px 16px rgba(99,102,241,0.55),
          0 0 100px 36px rgba(139,92,246,0.28);
      }
    }
    @keyframes cl-title-reveal {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cl-shimmer {
      0%   { background-position: -250% center; }
      100% { background-position: 250% center; }
    }
    @keyframes cl-tagline-in {
      0%   { opacity: 0; letter-spacing: 0.25em; }
      100% { opacity: 0.55; letter-spacing: 0.42em; }
    }
    @keyframes cl-bar {
      0%   { width: 0%; }
      18%  { width: 22%; }
      45%  { width: 55%; }
      75%  { width: 80%; }
      100% { width: 100%; }
    }
    @keyframes cl-orb-drift {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-48%, -52%) scale(1.08); }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      position: fixed;
      inset: 0;
      background-color: #09090b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
    }

    .cl-logo-wrap {
      animation:
        cl-logo-enter   0.75s cubic-bezier(0.34,1.56,0.64,1) forwards,
        cl-glow-pulse   2.4s ease-in-out 0.75s infinite;
      border-radius: 28px;
      padding: 3px;
      background: linear-gradient(135deg, rgba(99,102,241,0.6) 0%, rgba(139,92,246,0.6) 50%, rgba(168,85,247,0.6) 100%);
      margin-bottom: 28px;
      will-change: transform, box-shadow;
    }

    .logo-inner {
      border-radius: 26px;
      overflow: hidden;
      background: #18181b;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      display: block;
      border-radius: 14px;
      width: 96px;
      height: 96px;
    }

    .cl-title {
      background: linear-gradient(120deg, #a5b4fc 0%, #c084fc 45%, #818cf8 80%, #a5b4fc 100%);
      background-size: 250% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation:
        cl-title-reveal 0.55s ease-out 0.42s both,
        cl-shimmer      3.2s linear 1.1s infinite;
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      line-height: 1;
    }

    .cl-tagline {
      animation: cl-tagline-in 0.7s ease-out 0.82s both;
      color: rgba(255,255,255,0.55);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
    }

    .cl-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.06);
      width: 100%;
    }

    .cl-bar {
      animation: cl-bar 2.8s cubic-bezier(0.4,0,0.2,1) forwards;
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #a855f7);
      box-shadow: 0 0 12px rgba(139,92,246,0.9);
      border-radius: 0 2px 2px 0;
    }

    .cl-orb {
      animation: cl-orb-drift 6s ease-in-out infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 640px;
      height: 640px;
      background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, rgba(139,92,246,0.05) 45%, transparent 72%);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
    }

    .cl-orb-secondary {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(168,85,247,0.07) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Ambient background orb -->
  <div class="cl-orb"></div>

  <!-- Secondary subtle orb (top-right accent) -->
  <div class="cl-orb-secondary"></div>

  <!-- Logo -->
  <div class="cl-logo-wrap">
    <div class="logo-inner">
      <svg class="logo-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Fallback SVG logo -->
        <defs>
          <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="45" fill="url(#logoGradient)" opacity="0.9"/>
        <text x="50" y="60" font-size="50" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">C</text>
      </svg>
    </div>
  </div>

  <!-- App name -->
  <h1 class="cl-title">Coachlix</h1>

  <!-- Tagline -->
  <p class="cl-tagline">AI Fitness Coach</p>

  <!-- Netflix-style progress bar at the bottom -->
  <div class="cl-progress-bar">
    <div class="cl-bar"></div>
  </div>
</body>
</html>
